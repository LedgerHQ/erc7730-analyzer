# ===========================================================================
# Local testing stack — simulates the AWS deployment.
#
# Build + start:
#   docker compose up --build -d
#
# Test:
#   curl http://localhost:8080/health
#
# Call the service:
#   cd src/
#   uv run python -m service.client \
#     --service-url http://localhost:8080 \
#     --descriptor ../testing/registry/uniswap/calldata-UniswapV3Router02.json \
#     --analysis-mode multi --no-oidc
#
# Stop:
#   docker compose down
#
# Screenshots use native Speculos inside the analyzer container (no Docker socket).
#
# Image build requires a GitHub PAT with actions:read on app-ethereum (bakes stax+flex ELFs by default):
#   export GITHUB_TOKEN=ghp_...
#   docker compose build
# (compose passes GITHUB_TOKEN as BuildKit secret ``github_token``.)
# ===========================================================================

services:
  analyzer:
    build:
      context: .
      secrets:
        - github_token
    container_name: erc7730-analyzer
    ports:
      - "8080:8080"

    env_file:
      - .env

    environment:
      SERVICE_HOST: "0.0.0.0"
      SERVICE_PORT: "8080"
      ENABLE_SCREENSHOTS: "true"

    command: ["service"]

secrets:
  github_token:
    environment: GITHUB_TOKEN

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

    restart: unless-stopped
