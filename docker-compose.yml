# ===========================================================================
# Local testing stack — simulates the AWS deployment.
#
# Build + start:
#   docker compose up --build -d
#
# Test:
#   curl http://localhost:8080/health
#
# Call the service:
#   cd src/
#   uv run python -m service.client \
#     --service-url http://localhost:8080 \
#     --descriptor ../testing/registry/uniswap/calldata-UniswapV3Router02.json \
#     --analysis-mode multi --no-oidc
#
# Stop:
#   docker compose down
# ===========================================================================

services:
  # Pre-pull the Speculos emulator image.
  # cs-tester launches it as a sibling container via the Docker socket.
  speculos-pull:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["docker", "pull", "ghcr.io/ledgerhq/speculos"]
    restart: "no"

  analyzer:
    build: .
    container_name: erc7730-analyzer
    depends_on:
      speculos-pull:
        condition: service_completed_successfully

    # Host network so cs-tester can reach Speculos sibling containers on localhost
    network_mode: host

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Same path on host and container so Speculos sibling containers can mount ELF files
      - /tmp/erc7730-screenshots:/tmp/erc7730-screenshots

    env_file:
      - .env

    environment:
      SERVICE_HOST: "0.0.0.0"
      SERVICE_PORT: "8080"
      ENABLE_SCREENSHOTS: "true"
      # Use /tmp paths that match between host and container
      CS_TESTER_RUNTIME_ROOT: "/tmp/erc7730-screenshots"
      ETH_APP_ELF_ROOT: "/tmp/erc7730-screenshots/ethereum-app-elfs"

    command: ["service"]

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

    restart: unless-stopped
